<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>Shaka Player</title>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.0/jquery.min.js"></script>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/controls.min.css">

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.ui.min.js"></script>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:90%;
    background:#000;
    overflow:hidden;
}

#video-container{
    width:100vw;
    height:100vh;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

.shaka-play-button,
.shaka-spinner-container{
    transform:scale(.8);
}

.material-icons-round{
    color:#f1ff00!important;
}
</style>

</head>

<body>

<div
id="video-container"
data-shaka-player-container>

<video
id="video"
autoplay
playsinline
data-shaka-player
poster="/img/tv-static.gif">
</video>

</div>

<script>

const manifestUri =
'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/enc/ajfoeddkbz/out/v1/b78800b9b2304879b15843f455836829/cenc.mpd';

async function init(){

const video=document.getElementById('video');

const ui=video.ui;

const controls=ui.getControls();

const player=controls.getPlayer();

ui.configure({
    seekBarColors:{
        base:'rgba(255,255,255,.2)',
        buffered:'rgba(255,255,255,.4)',
        played:'rgb(255,0,0)'
    }
});

player.configure({
    drm:{
        clearKeys:{
            "f6564ec2aee819046328a0e153be574d":"ff46a8a1031eb27ef22576a077c98ab7"
        }
    }
});

window.player=player;
window.ui=ui;

player.addEventListener('error',onPlayerErrorEvent);
controls.addEventListener('error',onUIErrorEvent);

try{
    await player.load(manifestUri);
    console.log("Video Loaded");
}catch(error){
    onPlayerError(error);
}

$('.shaka-overflow-menu-button').html('settings');
$('.shaka-back-to-overflow-button .material-icons-round').html('arrow_back_ios_new');

}

function onPlayerErrorEvent(errorEvent){
    onPlayerError(errorEvent.detail);
}

function onUIErrorEvent(errorEvent){
    onPlayerError(errorEvent.detail);
}

function onPlayerError(error){
    console.error("Error",error.code,error);
}

function initFailed(errorEvent){
    console.error("Unable to load Shaka UI",errorEvent);
}

document.addEventListener("shaka-ui-loaded",init);
document.addEventListener("shaka-ui-load-failed",initFailed);

</script>

</body>
</html>
