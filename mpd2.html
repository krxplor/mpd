<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="//cdn.bitmovin.com/player/web/8/bitmovinplayer.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    height:100%;
    background:#080808;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* Center Player */

.wrapper{
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* Player Card */

.player-card{
    width:100%;
    max-width:1300px;
    background:#111;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.45);
}

/* Video */

#player-wrapper{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
}

#player{
    width:100%;
    height:100%;
}

/* Loading */

#status{
    position:absolute;
    inset:0;
    background:#000;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.spinner{
    width:55px;
    height:55px;
    border:4px solid rgba(255,255,255,.15);
    border-top:4px solid #ff0000;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.s-title{
    margin-top:18px;
    color:#fff;
    font-size:15px;
    letter-spacing:.5px;
}

/* Bitmovin Theme */

.bmpui-ui-watermark{
    background-image:url("https://github.io") !important;
}

.bmpui-ui-seekbar .bmpui-seekbar-playbackposition,
.bmpui-ui-volumeslider .bmpui-seekbar-playbackposition{
    background:#ff0000!important;
}

.bmpui-on,
.bmpui-ui-selectbox{
    color:#ff0000!important;
}

@media(max-width:768px){

.wrapper{
    padding:0;
}

.player-card{
    border-radius:0;
}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="player-card">

<div id="player-wrapper">

<div id="status">
<div class="spinner"></div>
<div class="s-title">Loading Stream...</div>
</div>

<div id="player"></div>

</div>

</div>

</div>




<script src="//cdn.bitmovin.com/player/web/8/bitmovinplayer.js"></script>

    <style>
       
        body { background: ; overflow: hidden; font-family: sans-serif; }
       
        #player { width: 100%; height: 100%; background: #000; }
        #status {
            position: absolute; inset: 0; z-index: 100; background: #000;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 18px; padding: 32px; text-align: center;
        }
        .spinner {
            width: 46px; height: 46px; border: 4px solid rgba(255,255,255,0.12);
            border-top-color: #a6e30b; border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .s-title { font-size: 1.15em; font-weight: 600; color: #fff; }

        /* Estilos UI Bitmovin */
        .bmpui-ui-watermark {
            background-image: url("https://github.io") !important;
            top: 0; left: 0; min-width: 5em;
        }
        .bmpui-ui-seekbar .bmpui-seekbar .bmpui-seekbar-playbackposition,
        .bmpui-ui-volumeslider .bmpui-seekbar .bmpui-seekbar-playbackposition {
            background-color: #e3d80b !important;
        }
        .bmpui-ui-selectbox, .bmpui-on { color: #e3d80b !important; }
    </style>


    <div id="wrapper">
        <div id="status">
            <div class="spinner"></div>
            <div class="s-title">Loading</div>
        </div>
        <div id="player"></div>
    </div>

    <script>
        var url = "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/fifa_ppv1/default/index.mpd";
        var ck_keyid = "2c338a117d434ce4bbe3569231af90f1";
        var ck_key = "a9633d901ee8a3f4f58ac314b5c5f4fb";


        function override(url) {
            var wm = document.querySelector('button.bmpui-ui-watermark');
            if (wm) wm.setAttribute('disabled', 'disabled');

            if (url.indexOf('licensing.bitmovin.com/licensing') > -1)
                return 'data:text/plain;charset=utf-8;base64,eyJzdGF0dXMiOiJncmFudGVkIiwibWVzc2FnZSI6IlRoZXJlIHlvdSBnby4ifQ==';
            if (url.indexOf('licensing.bitmovin.com/impression') > -1)
                return 'data:text/plain;charset=utf-8;base64,eyJzdGF0dXMiOiJncmFudGVkIiwibWVzc2FnZSI6IlRoZXJlIHlvdSBnby4ifQ==';
            return url;
        }

        var _xhrOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function () {
            arguments[1] = override(arguments[1]);
            return _xhrOpen.apply(this, arguments);
        };

        document.addEventListener('DOMContentLoaded', function () {
            var config = {
                key: '11d3698c-efdf-42f1-8769-54663995de2b',
                playback: { autoplay: true, muted: false },
                style: { width: '100%', height: '350px' }
            };

            var source = {
                dash: url,
                drm: {
                    clearkey: [{ keyId: ck_keyid, key: ck_key }]
                }
            };

            var player = new bitmovin.player.Player(document.getElementById('player'), config);
            
            player.load(source).then(function() {
                document.getElementById('status').style.display = 'none';
                console.log("Reproduciendo: TUDN");
            }).catch(function (err) {
                document.querySelector('.s-title').innerText = "Error al cargar el canal";
                console.error('Bitmovin error:', err);
            });
        });
    </script>
</body>
</html>
