<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Bitmovin Player</title>

<script src="//cdn.bitmovin.com/player/web/8/bitmovinplayer.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
}


/* Header */

.header{
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px;
    background:#121212;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
    font-size:20px;
    font-weight:700;
    letter-spacing:.5px;
}

.live{
    background:#ff0000;
    padding:5px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
}

/* Body */

.container{
    width:100vw;
    height:100vh;
    margin:0;
    padding:0;
}

/* Server Buttons */

.server-box{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.server-box button{
    flex:1;
    height:44px;
    border:none;
    border-radius:10px;
    background:#1d1d1d;
    color:#fff;
    cursor:pointer;
    font-weight:700;
    transition:.25s;
}

.server-box button:hover{
    background:#303030;
}

.server-box button.active{
    background:#e50914;
}

/* Player */

.player-card{
    width:100%;
    height:100%;
    background:#000;
    border-radius:0;
    box-shadow:none;
    overflow:hidden;
}

.player-title{
    padding:14px 18px;
    background:#181818;
    font-size:16px;
    font-weight:600;
}

#player-wrapper{
    position:relative;
    width:100%;
    height:100%;
    background:#000;
}

#player{
    width:100%;
    height:100%;
}
/* Loading */

#status{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#000;
    z-index:100;
}

.spinner{
    width:55px;
    height:55px;
    border:4px solid rgba(255,255,255,.15);
    border-top:4px solid #ff0000;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.s-title{
    margin-top:18px;
    font-size:16px;
}

/* Bitmovin */

.bmpui-ui-watermark{
    background-image:url("https://github.io") !important;
}

.bmpui-ui-seekbar .bmpui-seekbar-playbackposition,
.bmpui-ui-volumeslider .bmpui-seekbar-playbackposition{
    background:#ff0000 !important;
}

.bmpui-on,
.bmpui-ui-selectbox{
    color:#ff0000 !important;
}

@media(max-width:768px){

.header{
    height:55px;
}

.logo{
    font-size:18px;
}

.server-box button{
    height:42px;
}

}
</style>
</head>

<body>


<body>

<div class="container">

    <div class="player-card">

        <div id="player-wrapper">

            <div id="status">
                <div class="spinner"></div>
                <div class="s-title">Loading Stream...</div>
            </div>

            <div id="player"></div>

        </div>

    </div>

</div>

<!-- Your JavaScript stays exactly the same -->

</body>

<script>

var url="https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/fifa_ppv1/default/index.mpd";

var ck_keyid="2c338a117d434ce4bbe3569231af90f1";

var ck_key="a9633d901ee8a3f4f58ac314b5c5f4fb";

function override(url){

    var wm=document.querySelector('button.bmpui-ui-watermark');

    if(wm) wm.setAttribute('disabled','disabled');

    if(url.indexOf('licensing.bitmovin.com/licensing')>-1)
        return 'data:text/plain;charset=utf-8;base64,eyJzdGF0dXMiOiJncmFudGVkIiwibWVzc2FnZSI6IlRoZXJlIHlvdSBnby4ifQ==';

    if(url.indexOf('licensing.bitmovin.com/impression')>-1)
        return 'data:text/plain;charset=utf-8;base64,eyJzdGF0dXMiOiJncmFudGVkIiwibWVzc2FnZSI6IlRoZXJlIHlvdSBnby4ifQ==';

    return url;
}

var _xhrOpen=XMLHttpRequest.prototype.open;

XMLHttpRequest.prototype.open=function(){

    arguments[1]=override(arguments[1]);

    return _xhrOpen.apply(this,arguments);

};

document.addEventListener("DOMContentLoaded",function(){

    var config={
        key:"11d3698c-efdf-42f1-8769-54663995de2b",
        playback:{
            autoplay:true,
            muted:false
        }
    };

    var source={
        dash:url,
        drm:{
            clearkey:[
                {
                    keyId:ck_keyid,
                    key:ck_key
                }
            ]
        }
    };

    var player=new bitmovin.player.Player(
        document.getElementById("player"),
        config
    );

    player.load(source).then(function(){

        document.getElementById("status").style.display="none";

    }).catch(function(err){

        document.querySelector(".s-title").innerHTML="Failed to load stream.";

        console.log(err);

    });

});
</script>

</body>
</html>
